<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Navigation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 星空の背景 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        /* 惑星のスタイル */
        .planet {
            position: absolute;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.7), 
                        0 0 20px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float var(--float-duration) infinite ease-in-out;
            cursor: pointer;
            z-index: 10;
        }

        .planet:hover {
            transform: scale(1.15) !important;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 
                        0 0 40px rgba(255,255,255,0.4);
            z-index: 20;
        }

        .planet-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-top: 5px;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 管理パネル */
        #admin-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 80vh;
            overflow-y: auto;
        }

        .hidden-panel {
            transform: translate(-50%, -40%) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }

        .visible-panel {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        #admin-panel::-webkit-scrollbar {
            width: 6px;
        }
        #admin-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <div class="absolute top-10 w-full text-center pointer-events-none">
        <h1 class="text-3xl font-light tracking-widest text-blue-200 opacity-80 uppercase">Cosmic Hub</h1>
        <p class="text-sm text-blue-400 mt-2">未知のサイトへの航路（リンク）をクリックしてください</p>
    </div>

    <div id="universe" class="w-full h-full relative"></div>

    <button onclick="checkPassword()" class="fixed bottom-6 right-6 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-5 py-2 rounded-full backdrop-blur-md transition-all z-50 flex items-center gap-2">
        <span>⚙️</span> 管理
    </button>

    <div id="admin-panel" class="fixed top-1/2 left-1/2 hidden-panel w-[90%] max-w-md p-6 rounded-2xl z-[100] shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-xl font-bold">銀河の管理</h2>
            <button onclick="addPlanetField()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1.5 rounded-lg transition-colors">
                ＋ 惑星を追加
            </button>
        </div>
        
        <div id="planet-editor-list" class="space-y-6 mb-8"></div>

        <div class="sticky bottom-0 bg-slate-900/80 p-4 -mx-6 -mb-6 flex gap-2 border-t border-white/10">
            <button onclick="saveAll()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-xl font-bold transition-colors">
                変更を宇宙に反映
            </button>
            <button onclick="resetToDefault()" class="bg-red-900/50 hover:bg-red-800 text-white px-4 rounded-xl text-xs transition-colors">
                初期化
            </button>
            <button onclick="toggleAdmin()" class="flex-1 bg-white/10 hover:bg-white/20 text-white py-2.5 rounded-xl transition-colors">
                閉じる
            </button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "893012";
        let planetsData = [];

        // 【ここを直接編集してください】
        // 直接URLを埋め込むためのデフォルトデータ
        const defaultPlanets = [
            { 
                id: 1, 
                name: 'Google', 
                url: 'https://google.com', 
                color: '#ff6b6b', 
                secondaryColor: '#8b0000', 
                size: 100, 
                x: 15, 
                y: 25 
            },
            { 
                id: 2, 
                name: 'GitHub', 
                url: 'https://gemini.google.com/gem/1D47uZxbQOtlSA43Qn0ctQoOZGvUbZqs7?usp=sharing', 
                color: '#4facfe', 
                secondaryColor: '#003366', 
                size: 130, 
                x: 70, 
                y: 20 
            },
            { 
                id: 3, 
                name: 'YouTube', 
                url: 'https://youtube.com', 
                color: '#f9d423', 
                secondaryColor: '#ff4e50', 
                size: 90, 
                x: 35, 
                y: 70 
            },
            { 
                id: 4, 
                name: 'Twitter', 
                url: 'https://twitter.com', 
                color: '#a18cd1', 
                secondaryColor: '#4b0082', 
                size: 110, 
                x: 65, 
                y: 75 
            }
        ];

        function createStars() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                starfield.appendChild(star);
            }
        }

        function loadPlanets() {
            const saved = localStorage.getItem('cosmic_planets_v2');
            // 保存されたデータがある場合はそれを、なければコード内のdefaultPlanetsを使用
            planetsData = saved ? JSON.parse(saved) : [...defaultPlanets];
            renderUniverse();
        }

        function renderUniverse() {
            const container = document.getElementById('universe');
            container.innerHTML = '';
            planetsData.forEach((p, index) => {
                const el = document.createElement('a');
                el.href = p.url;
                el.target = "_blank";
                el.className = 'planet';
                el.style.width = p.size + 'px';
                el.style.height = p.size + 'px';
                el.style.left = p.x + '%';
                el.style.top = p.y + '%';
                el.style.background = `radial-gradient(circle at 30% 30%, ${p.color}, ${p.secondaryColor})`;
                el.style.setProperty('--float-duration', (6 + (index % 4)) + 's');
                
                const label = document.createElement('span');
                label.className = 'planet-label';
                label.innerText = p.name;
                
                el.appendChild(label);
                container.appendChild(el);
            });
        }

        function checkPassword() {
            const pass = prompt("管理用パスワードを入力してください:");
            if (pass === ADMIN_PASSWORD) {
                toggleAdmin();
            } else if (pass !== null) {
                alert("パスワードが違います。");
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            if (panel.classList.contains('hidden-panel')) {
                renderAdminList();
                panel.classList.remove('hidden-panel');
                panel.classList.add('visible-panel');
            } else {
                panel.classList.remove('visible-panel');
                panel.classList.add('hidden-panel');
            }
        }

        function renderAdminList() {
            const list = document.getElementById('planet-editor-list');
            list.innerHTML = '';
            planetsData.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = "bg-white/5 p-4 rounded-xl border border-white/10 relative";
                item.innerHTML = `
                    <button onclick="removePlanet(${index})" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center">✕</button>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-1">
                            <label class="text-[10px] text-gray-400 block uppercase">名前</label>
                            <input type="text" value="${p.name}" onchange="updateData(${index}, 'name', this.value)" class="w-full bg-black/40 border border-white/10 rounded px-2 py-1 text-sm">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] text-gray-400 block uppercase">色 (HEX)</label>
                            <input type="color" value="${p.color}" onchange="updateData(${index}, 'color', this.value)" class="w-full h-8 bg-transparent border-none cursor-pointer">
                        </div>
                        <div class="col-span-2">
                            <label class="text-[10px] text-gray-400 block uppercase">URL</label>
                            <input type="text" value="${p.url}" onchange="updateData(${index}, 'url', this.value)" class="w-full bg-black/40 border border-white/10 rounded px-2 py-1 text-sm">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] text-gray-400 block uppercase">位置 X (%)</label>
                            <input type="number" value="${p.x}" onchange="updateData(${index}, 'x', this.value)" class="w-full bg-black/40 border border-white/10 rounded px-2 py-1 text-sm">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[10px] text-gray-400 block uppercase">位置 Y (%)</label>
                            <input type="number" value="${p.y}" onchange="updateData(${index}, 'y', this.value)" class="w-full bg-black/40 border border-white/10 rounded px-2 py-1 text-sm">
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function addPlanetField() {
            const newPlanet = {
                id: Date.now(),
                name: 'New World',
                url: 'https://',
                color: '#ffffff',
                secondaryColor: '#333333',
                size: 80 + Math.random() * 40,
                x: 10 + Math.random() * 80,
                y: 15 + Math.random() * 70
            };
            planetsData.push(newPlanet);
            renderAdminList();
        }

        function removePlanet(index) {
            planetsData.splice(index, 1);
            renderAdminList();
        }

        function updateData(index, key, value) {
            let val = value;
            if (key === 'x' || key === 'y') val = parseInt(value);
            planetsData[index][key] = val;
            if (key === 'color') {
                planetsData[index].secondaryColor = darkenColor(value);
            }
        }

        function darkenColor(hex) {
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16);
            return `rgb(${r*0.4}, ${g*0.4}, ${b*0.4})`;
        }

        function saveAll() {
            localStorage.setItem('cosmic_planets_v2', JSON.stringify(planetsData));
            renderUniverse();
            toggleAdmin();
        }

        // コードに記述したデフォルト値に強制リセットする関数
        function resetToDefault() {
            if(confirm("コード内のデフォルト設定に戻しますか？保存した変更は消去されます。")) {
                localStorage.removeItem('cosmic_planets_v2');
                planetsData = [...defaultPlanets];
                renderUniverse();
                renderAdminList();
                alert("初期化しました。");
            }
        }

        window.onload = () => {
            createStars();
            loadPlanets();
        };
    </script>
</body>
</html>
