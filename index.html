<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Navigation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 星空の背景 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        /* 惑星のスタイル */
        .planet {
            position: absolute;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.7), 
                        0 0 20px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float var(--float-duration) infinite ease-in-out;
            cursor: pointer;
            z-index: 10;
        }

        .planet:hover {
            transform: scale(1.15) !important;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 
                        0 0 40px rgba(255,255,255,0.4);
            z-index: 20;
        }

        .planet-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-top: 5px;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <div class="absolute top-10 w-full text-center pointer-events-none">
        <h1 class="text-3xl font-light tracking-widest text-blue-200 opacity-80 uppercase">Cosmic Hub</h1>
        <p class="text-sm text-blue-400 mt-2">未知のサイトへの航路（リンク）をクリックしてください</p>
    </div>

    <div id="universe" class="w-full h-full relative"></div>

    <script>
        // 【リンク集の設定】
        // ここに惑星（リンク）を追加・編集してください
        const planetsData = [
            { 
                name: 'Google', 
                url: 'https://google.com', 
                color: '#ff6b6b', 
                secondaryColor: '#8b0000', 
                size: 100, 
                x: 15, 
                y: 25 
            },
            { 
                name: 'My Way', 
                url: 'https://gemini.google.com/gem/1D47uZxbQOtlSA43Qn0ctQoOZGvUbZqs7?usp=sharing', 
                color: '#4facfe', 
                secondaryColor: '#003366', 
                size: 130, 
                x: 70, 
                y: 20 
            },
            { 
                name: 'YouTube', 
                url: 'https://youtube.com', 
                color: '#f9d423', 
                secondaryColor: '#ff4e50', 
                size: 90, 
                x: 35, 
                y: 70 
            },
            { 
                name: 'Twitter', 
                url: 'https://twitter.com', 
                color: '#a18cd1', 
                secondaryColor: '#4b0082', 
                size: 110, 
                x: 65, 
                y: 75 
            }
        ];

        // 星を背景に生成
        function createStars() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                starfield.appendChild(star);
            }
        }

        // 宇宙空間に惑星を描画
        function renderUniverse() {
            const container = document.getElementById('universe');
            container.innerHTML = '';
            planetsData.forEach((p, index) => {
                const el = document.createElement('a');
                el.href = p.url;
                el.target = "_blank";
                el.className = 'planet';
                el.style.width = p.size + 'px';
                el.style.height = p.size + 'px';
                el.style.left = p.x + '%';
                el.style.top = p.y + '%';
                el.style.background = `radial-gradient(circle at 30% 30%, ${p.color}, ${p.secondaryColor})`;
                // 浮遊アニメーションの速度を少しずつずらす
                el.style.setProperty('--float-duration', (6 + (index % 4)) + 's');
                
                const label = document.createElement('span');
                label.className = 'planet-label';
                label.innerText = p.name;
                
                el.appendChild(label);
                container.appendChild(el);
            });
        }

        window.onload = () => {
            createStars();
            renderUniverse();
        };
    </script>
</body>
</html>
